name: Build Android APK

# Manual trigger ("Run workflow" button in the Actions tab) plus a push to main.
# The APK lands as a downloadable artifact on the run page.
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm deps
        run: npm ci

      # Inject the backend URL the phone build will call into the static export.
      # Set NEXT_PUBLIC_API_BASE in the repo's Settings → Secrets and variables → Actions.
      # If the secret is unset, the build falls back to the placeholder in .env.capacitor.
      - name: Write .env.capacitor from secret
        env:
          API_BASE: ${{ secrets.NEXT_PUBLIC_API_BASE }}
        run: |
          if [ -n "$API_BASE" ]; then
            echo "NEXT_PUBLIC_API_BASE=$API_BASE" > .env.capacitor
            echo "NEXT_PUBLIC_BUILD_TARGET=capacitor" >> .env.capacitor
            echo "Wrote .env.capacitor with backend URL"
          else
            echo "WARN: NEXT_PUBLIC_API_BASE secret is empty — using placeholder URL. The APK will not be able to reach your backend until you set the secret and re-run."
          fi

      - name: Build web assets + Capacitor sync
        run: npm run cap:sync

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: McCarthy-FSO-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
